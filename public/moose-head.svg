<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Antlers left -->
  <path d="M 32 28 L 26 10 M 26 10 L 20 4 M 26 10 L 22 14 M 26 10 L 30 5" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Antlers right -->
  <path d="M 68 28 L 74 10 M 74 10 L 80 4 M 74 10 L 78 14 M 74 10 L 70 5" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Head -->
  <ellipse cx="50" cy="52" rx="22" ry="26" fill="#1a1a1a"/>
  <!-- Snout / bulbous nose -->
  <ellipse cx="50" cy="71" rx="13" ry="9" fill="#1a1a1a"/>
  <ellipse cx="50" cy="74" rx="9" ry="6" fill="#2a2a2a"/>
  <!-- Nostrils -->
  <ellipse cx="46" cy="75" rx="2" ry="1.5" fill="#111"/>
  <ellipse cx="54" cy="75" rx="2" ry="1.5" fill="#111"/>
  <!-- Eyes -->
  <circle cx="40" cy="48" r="4" fill="#fff"/>
  <circle cx="60" cy="48" r="4" fill="#fff"/>
  <circle cx="41" cy="48" r="2.5" fill="#1a1a1a"/>
  <circle cx="61" cy="48" r="2.5" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="42" cy="47" r="1" fill="#fff"/>
  <circle cx="62" cy="47" r="1" fill="#fff"/>
  <!-- Ears -->
  <ellipse cx="27" cy="40" rx="6" ry="9" fill="#1a1a1a" transform="rotate(-15 27 40)"/>
  <ellipse cx="73" cy="40" rx="6" ry="9" fill="#1a1a1a" transform="rotate(15 73 40)"/>
</svg>